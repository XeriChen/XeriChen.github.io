# 1. 媒体文件配置（保持页面束特性）
media:
  input: content
  output: /
  path: /

# 2. 内容集合配置
content:
  - name: posts
    label: 博客文章
    type: collection
    path: content/posts
    format: yaml-frontmatter  # 关键修复：明确指定为 yaml-frontmatter 格式
    fields:
      - name: title
        label: 标题
        type: string
      - name: date
        label: 发布日期
        type: date
      - name: draft
        label: 是否为草稿
        type: boolean
        default: false
      - name: tags
        label: 标签
        type: list
      - name: description
        label: 文章摘要
        type: text
      - name: body
        label: 正文内容
        type: rich-text
        options:
          format: markdown
          switcher: true
          media: false